---
apiVersion: v1
kind: ConfigMap
metadata:
  name: snmp-exporter-config
  namespace: data-storage
data:
  snmp.yml: |
    auths:
      public_v2:
        community: public
        security_level: noAuthNoPriv
        auth_protocol: MD5
        priv_protocol: DES
        version: 2
    
    modules:
      if_mib:
        walk:
          - 1.3.6.1.2.1.2.2.1.10  # ifInOctets
          - 1.3.6.1.2.1.2.2.1.16  # ifOutOctets
          - 1.3.6.1.2.1.2.2.1.13  # ifInDiscards
          - 1.3.6.1.2.1.2.2.1.14  # ifInErrors
          - 1.3.6.1.2.1.2.2.1.19  # ifOutDiscards
          - 1.3.6.1.2.1.2.2.1.20  # ifOutErrors
          - 1.3.6.1.2.1.2.2.1.8   # ifOperStatus
          - 1.3.6.1.2.1.31.1.1.1.6  # ifHCInOctets
          - 1.3.6.1.2.1.31.1.1.1.10 # ifHCOutOctets
          - 1.3.6.1.2.1.2.2.1.5   # ifSpeed
        lookups:
          - source_indexes: [ifIndex]
            lookup: ifName
          - source_indexes: [ifIndex]
            lookup: ifDescr
        overrides:
          ifOperStatus:
            type: gauge
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: snmp-exporter
  namespace: data-storage
  labels:
    app: snmp-exporter
spec:
  replicas: 1
  selector:
    matchLabels:
      app: snmp-exporter
  template:
    metadata:
      labels:
        app: snmp-exporter
    spec:
      nodeSelector:
        kubernetes.io/hostname: ubuntu-desktop
      containers:
      - name: snmp-exporter
        image: prom/snmp-exporter:v0.25.0
        args:
          - "--config.file=/etc/snmp_exporter/snmp.yml"
        ports:
        - containerPort: 9116
          name: http
        resources:
          requests:
            cpu: 100m
            memory: 128Mi
          limits:
            cpu: 500m
            memory: 512Mi
        volumeMounts:
        - name: config
          mountPath: /etc/snmp_exporter
      volumes:
      - name: config
        configMap:
          name: snmp-exporter-config
---
apiVersion: v1
kind: Service
metadata:
  name: snmp-exporter
  namespace: data-storage
  labels:
    app: snmp-exporter
spec:
  type: ClusterIP
  ports:
  - port: 9116
    targetPort: http
    protocol: TCP
    name: http
  selector:
    app: snmp-exporter
