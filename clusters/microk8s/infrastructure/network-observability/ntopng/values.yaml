## ntopng Configuration

image:
  repository: ntop/ntopng
  tag: "latest"
  pullPolicy: IfNotPresent

## Service configuration
service:
  type: ClusterIP
  port: 3000

## Ingress configuration
ingress:
  enabled: true
  className: nginx
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
  hosts:
    - host: ntopng.local.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: ntopng-tls
      hosts:
        - ntopng.local.example.com

## Persistence for historical data
persistence:
  enabled: true
  storageClass: microk8s-hostpath
  accessMode: ReadWriteOnce
  size: 10Gi

## Network monitoring configuration
netflow:
  enabled: true
  port: 2055

sflow:
  enabled: false
  port: 6343

## Router configuration
router:
  ip: "192.168.1.1"
  interface: "eth0"

## Resource limits
resources:
  requests:
    cpu: 500m
    memory: 512Mi
  limits:
    cpu: 2000m
    memory: 2Gi

## Node selector
nodeSelector:
  kubernetes.io/hostname: ubuntu-desktop

## Security context
securityContext:
  runAsUser: 1000
  runAsGroup: 1000
  fsGroup: 1000

## ntopng specific configuration
config:
  # Admin credentials (change in production)
  adminUser: admin
  adminPassword: changeme
  # Data retention
  dataRetention: 30d
  # Local networks to monitor
  localNetworks: "192.168.0.0/16,10.0.0.0/8"
