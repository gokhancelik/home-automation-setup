---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: ntopng
  namespace: network-observability
spec:
  interval: 15m
  chart:
    spec:
      chart: ./clusters/microk8s/infrastructure/network-observability/ntopng
      sourceRef:
        kind: GitRepository
        name: flux-system
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    image:
      repository: ntop/ntopng
      tag: "latest"
    
    ingress:
      enabled: true
      className: nginx
      hosts:
        - host: ntopng.home.local
          paths:
            - path: /
              pathType: Prefix
      tls: []
    
    persistence:
      enabled: true
      storageClass: microk8s-hostpath
      size: 10Gi
    
    netflow:
      enabled: true
      port: 2055
    
    router:
      ip: "192.168.2.1"
    
    config:
      adminUser: admin
      adminPassword: changeme
      localNetworks: "192.168.0.0/16,10.0.0.0/8"
    
    nodeSelector:
      kubernetes.io/hostname: ubuntu-desktop
    
    resources:
      requests:
        cpu: 500m
        memory: 512Mi
      limits:
        cpu: 2000m
        memory: 2Gi
