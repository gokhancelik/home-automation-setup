---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: ntopng
  namespace: network-observability
  labels:
    app: ntopng
spec:
  replicas: 1
  selector:
    matchLabels:
      app: ntopng
  template:
    metadata:
      labels:
        app: ntopng
    spec:
      nodeSelector:
        kubernetes.io/hostname: ubuntu-desktop
      containers:
      - name: ntopng
        image: ntop/ntopng:latest
        imagePullPolicy: IfNotPresent
        ports:
        - name: http
          containerPort: 3000
          protocol: TCP
        - name: netflow
          containerPort: 2055
          protocol: UDP
        env:
        - name: NTOPNG_ADMIN_PASSWORD
          value: "changeme123"  # TODO: Move to sealed secret
        args:
        - --community
        - --http-port=3000
        - --data-dir=/var/lib/ntopng
        - --local-networks=192.168.0.0/16,10.0.0.0/8
        - -W=2055
        volumeMounts:
        - name: data
          mountPath: /var/lib/ntopng
        resources:
          requests:
            cpu: 250m
            memory: 512Mi
          limits:
            cpu: 1000m
            memory: 1Gi
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: ntopng-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: ntopng-data
  namespace: network-observability
spec:
  accessModes:
  - ReadWriteOnce
  storageClassName: microk8s-hostpath
  resources:
    requests:
      storage: 10Gi
