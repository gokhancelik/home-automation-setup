---
apiVersion: helm.toolkit.fluxcd.io/v2beta2
kind: HelmRelease
metadata:
  name: prometheus
  namespace: observability
spec:
  interval: 15m
  chart:
    spec:
      chart: prometheus
      version: 25.x
      sourceRef:
        kind: HelmRepository
        name: prometheus-community
        namespace: flux-system
      interval: 15m
  install:
    createNamespace: false
    remediation:
      retries: 3
  upgrade:
    remediation:
      retries: 3
  values:
    server:
      replicaCount: 1
      retention: 15d
      persistentVolume:
        enabled: true
        storageClass: microk8s-hostpath
        size: 20Gi
      
      nodeSelector:
        kubernetes.io/hostname: ubuntu-desktop
      
      resources:
        requests:
          cpu: 500m
          memory: 1Gi
        limits:
          cpu: 2000m
          memory: 4Gi
      
      # Scrape configurations
      extraScrapeConfigs: |
        - job_name: 'snmp-exporter'
          static_configs:
            - targets:
              - 192.168.1.1  # Router IP
          metrics_path: /snmp
          params:
            module: [if_mib]
          relabel_configs:
            - source_labels: [__address__]
              target_label: __param_target
            - source_labels: [__param_target]
              target_label: instance
            - target_label: __address__
              replacement: snmp-exporter.observability.svc.cluster.local:9116

    alertmanager:
      enabled: false
    
    kube-state-metrics:
      enabled: false
    
    prometheus-node-exporter:
      enabled: false
    
    prometheus-pushgateway:
      enabled: false
