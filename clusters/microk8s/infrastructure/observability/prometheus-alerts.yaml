---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-network-alerts
  namespace: observability
data:
  network-alerts.yml: |
    groups:
    - name: network_bottlenecks
      interval: 30s
      rules:
      - alert: WANUtilizationHigh
        expr: |
          (rate(ifHCOutOctets{ifDescr=~".*WAN.*"}[5m]) * 8) / ifSpeed{ifDescr=~".*WAN.*"} > 0.9
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "WAN interface utilization above 90%"
          description: "WAN interface {{ $labels.ifDescr }} utilization is {{ $value | humanizePercentage }} for 5 minutes"
      
      - alert: InterfacePacketDrops
        expr: |
          rate(ifInDiscards[5m]) + rate(ifOutDiscards[5m]) > 100
        for: 2m
        labels:
          severity: warning
        annotations:
          summary: "High packet drop rate on interface"
          description: "Interface {{ $labels.ifDescr }} is dropping {{ $value }} packets/sec"
      
      - alert: InterfaceErrors
        expr: |
          rate(ifInErrors[5m]) + rate(ifOutErrors[5m]) > 10
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Interface errors detected"
          description: "Interface {{ $labels.ifDescr }} has {{ $value }} errors/sec"
      
      - alert: InterfaceDown
        expr: |
          ifOperStatus != 1
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Network interface is down"
          description: "Interface {{ $labels.ifDescr }} is not operational"
