apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  cluster-overview.json: |
    {
  "title": "Kubernetes Cluster Overview",
  "tags": ["kubernetes", "cluster", "overview"],
  "timezone": "browser",
  "schemaVersion": 38,
  "version": 1,
  "refresh": "30s",
  "time": {
    "from": "now-1h",
    "to": "now"
  },
  "panels": [
    {
      "id": 1,
      "title": "Cluster Nodes Status",
      "type": "stat",
      "gridPos": {"h": 6, "w": 6, "x": 0, "y": 0},
      "targets": [
        {
          "expr": "count(up{job=\"kubernetes-nodes\"})",
          "legendFormat": "Total Nodes",
          "refId": "A"
        }
      ],
      "options": {
        "reduceOptions": {
          "values": false,
          "calcs": ["lastNotNull"]
        },
        "textMode": "value_and_name",
        "colorMode": "value"
      },
      "fieldConfig": {
        "defaults": {
          "thresholds": {
            "mode": "absolute",
            "steps": [
              {"value": 0, "color": "red"},
              {"value": 1, "color": "yellow"},
              {"value": 2, "color": "green"}
            ]
          }
        }
      }
    },
    {
      "id": 2,
      "title": "Total Pods Running",
      "type": "stat",
      "gridPos": {"h": 6, "w": 6, "x": 6, "y": 0},
      "targets": [
        {
          "expr": "count(kube_pod_info)",
          "legendFormat": "Running Pods",
          "refId": "A"
        }
      ],
      "options": {
        "reduceOptions": {
          "values": false,
          "calcs": ["lastNotNull"]
        },
        "colorMode": "value"
      },
      "fieldConfig": {
        "defaults": {
          "thresholds": {
            "mode": "absolute",
            "steps": [
              {"value": 0, "color": "red"},
              {"value": 10, "color": "green"}
            ]
          },
          "unit": "short"
        }
      }
    },
    {
      "id": 3,
      "title": "Cluster CPU Usage",
      "type": "gauge",
      "gridPos": {"h": 6, "w": 6, "x": 12, "y": 0},
      "targets": [
        {
          "expr": "(1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))) * 100",
          "legendFormat": "CPU %",
          "refId": "A"
        }
      ],
      "options": {
        "showThresholdLabels": false,
        "showThresholdMarkers": true
      },
      "fieldConfig": {
        "defaults": {
          "unit": "percent",
          "min": 0,
          "max": 100,
          "thresholds": {
            "mode": "absolute",
            "steps": [
              {"value": 0, "color": "green"},
              {"value": 70, "color": "yellow"},
              {"value": 90, "color": "red"}
            ]
          }
        }
      }
    },
    {
      "id": 4,
      "title": "Cluster Memory Usage",
      "type": "gauge",
      "gridPos": {"h": 6, "w": 6, "x": 18, "y": 0},
      "targets": [
        {
          "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
          "legendFormat": "Memory %",
          "refId": "A"
        }
      ],
      "options": {
        "showThresholdLabels": false,
        "showThresholdMarkers": true
      },
      "fieldConfig": {
        "defaults": {
          "unit": "percent",
          "min": 0,
          "max": 100,
          "thresholds": {
            "mode": "absolute",
            "steps": [
              {"value": 0, "color": "green"},
              {"value": 80, "color": "yellow"},
              {"value": 95, "color": "red"}
            ]
          }
        }
      }
    },
    {
      "id": 5,
      "title": "Node CPU Usage by Node",
      "type": "timeseries",
      "gridPos": {"h": 8, "w": 12, "x": 0, "y": 6},
      "targets": [
        {
          "expr": "(1 - avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))) * 100",
          "legendFormat": "{{instance}}",
          "refId": "A"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "percent",
          "min": 0,
          "max": 100,
          "custom": {
            "lineWidth": 2,
            "fillOpacity": 10
          }
        }
      }
    },
    {
      "id": 6,
      "title": "Node Memory Usage by Node",
      "type": "timeseries",
      "gridPos": {"h": 8, "w": 12, "x": 12, "y": 6},
      "targets": [
        {
          "expr": "(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100",
          "legendFormat": "{{instance}}",
          "refId": "A"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "percent",
          "min": 0,
          "max": 100,
          "custom": {
            "lineWidth": 2,
            "fillOpacity": 10
          }
        }
      }
    },
    {
      "id": 7,
      "title": "Top Pods by CPU",
      "type": "table",
      "gridPos": {"h": 8, "w": 12, "x": 0, "y": 14},
      "targets": [
        {
          "expr": "topk(10, sum by (namespace, pod) (rate(container_cpu_usage_seconds_total{pod!=\"\"}[5m])))",
          "format": "table",
          "instant": true,
          "refId": "A"
        }
      ],
      "transformations": [
        {
          "id": "organize",
          "options": {
            "excludeByName": {
              "Time": true
            },
            "renameByName": {
              "namespace": "Namespace",
              "pod": "Pod",
              "Value": "CPU (cores)"
            }
          }
        }
      ]
    },
    {
      "id": 8,
      "title": "Top Pods by Memory",
      "type": "table",
      "gridPos": {"h": 8, "w": 12, "x": 12, "y": 14},
      "targets": [
        {
          "expr": "topk(10, sum by (namespace, pod) (container_memory_working_set_bytes{pod!=\"\"}))",
          "format": "table",
          "instant": true,
          "refId": "A"
        }
      ],
      "transformations": [
        {
          "id": "organize",
          "options": {
            "excludeByName": {
              "Time": true
            },
            "renameByName": {
              "namespace": "Namespace",
              "pod": "Pod",
              "Value": "Memory"
            }
          }
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "bytes"
        }
      }
    }
  ]
}

  
  network-traffic.json: |
    {
  "title": "Network Traffic Overview",
  "tags": ["network", "traffic", "bandwidth"],
  "timezone": "browser",
  "schemaVersion": 38,
  "version": 1,
  "refresh": "30s",
  "time": {
    "from": "now-1h",
    "to": "now"
  },
  "panels": [
    {
      "id": 1,
      "title": "Total Network Traffic (All Nodes)",
      "type": "timeseries",
      "gridPos": {"h": 8, "w": 24, "x": 0, "y": 0},
      "targets": [
        {
          "expr": "sum(rate(node_network_receive_bytes_total{device!~\"lo|veth.*|cali.*|docker.*\"}[5m])) * 8 / 1000000",
          "legendFormat": "Download (Mbps)",
          "refId": "A"
        },
        {
          "expr": "sum(rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|cali.*|docker.*\"}[5m])) * 8 / 1000000",
          "legendFormat": "Upload (Mbps)",
          "refId": "B"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "Mbits",
          "custom": {
            "lineWidth": 2,
            "fillOpacity": 20,
            "gradientMode": "opacity"
          }
        }
      }
    },
    {
      "id": 2,
      "title": "Network Traffic by Node",
      "type": "timeseries",
      "gridPos": {"h": 8, "w": 12, "x": 0, "y": 8},
      "targets": [
        {
          "expr": "sum by (instance) (rate(node_network_receive_bytes_total{device!~\"lo|veth.*|cali.*|docker.*\"}[5m])) * 8 / 1000000",
          "legendFormat": "{{instance}} RX",
          "refId": "A"
        },
        {
          "expr": "sum by (instance) (rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|cali.*|docker.*\"}[5m])) * 8 / 1000000",
          "legendFormat": "{{instance}} TX",
          "refId": "B"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "Mbits",
          "custom": {
            "lineWidth": 2,
            "fillOpacity": 10
          }
        }
      }
    },
    {
      "id": 3,
      "title": "Network Traffic by Interface",
      "type": "timeseries",
      "gridPos": {"h": 8, "w": 12, "x": 12, "y": 8},
      "targets": [
        {
          "expr": "rate(node_network_receive_bytes_total{device!~\"lo|veth.*|cali.*|docker.*\"}[5m]) * 8 / 1000000",
          "legendFormat": "{{instance}}/{{device}} RX",
          "refId": "A"
        },
        {
          "expr": "rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|cali.*|docker.*\"}[5m]) * 8 / 1000000",
          "legendFormat": "{{instance}}/{{device}} TX",
          "refId": "B"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "Mbits",
          "custom": {
            "lineWidth": 1,
            "fillOpacity": 5
          }
        }
      }
    },
    {
      "id": 4,
      "title": "Packet Drop Rate",
      "type": "timeseries",
      "gridPos": {"h": 8, "w": 12, "x": 0, "y": 16},
      "targets": [
        {
          "expr": "rate(node_network_receive_drop_total{device!~\"lo|veth.*|cali.*|docker.*\"}[5m])",
          "legendFormat": "{{instance}}/{{device}} RX Drops",
          "refId": "A"
        },
        {
          "expr": "rate(node_network_transmit_drop_total{device!~\"lo|veth.*|cali.*|docker.*\"}[5m])",
          "legendFormat": "{{instance}}/{{device}} TX Drops",
          "refId": "B"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "pps",
          "custom": {
            "lineWidth": 2
          }
        }
      }
    },
    {
      "id": 5,
      "title": "Network Errors",
      "type": "timeseries",
      "gridPos": {"h": 8, "w": 12, "x": 12, "y": 16},
      "targets": [
        {
          "expr": "rate(node_network_receive_errs_total{device!~\"lo|veth.*|cali.*|docker.*\"}[5m])",
          "legendFormat": "{{instance}}/{{device}} RX Errors",
          "refId": "A"
        },
        {
          "expr": "rate(node_network_transmit_errs_total{device!~\"lo|veth.*|cali.*|docker.*\"}[5m])",
          "legendFormat": "{{instance}}/{{device}} TX Errors",
          "refId": "B"
        }
      ],
      "fieldConfig": {
        "defaults": {
          "unit": "pps",
          "custom": {
            "lineWidth": 2
          }
        }
      }
    },
    {
      "id": 6,
      "title": "Total Data Transferred (24h)",
      "type": "stat",
      "gridPos": {"h": 4, "w": 12, "x": 0, "y": 24},
      "targets": [
        {
          "expr": "sum(increase(node_network_receive_bytes_total{device!~\"lo|veth.*|cali.*|docker.*\"}[24h]))",
          "legendFormat": "Downloaded",
          "refId": "A"
        }
      ],
      "options": {
        "reduceOptions": {
          "values": false,
          "calcs": ["lastNotNull"]
        },
        "textMode": "value_and_name",
        "colorMode": "value"
      },
      "fieldConfig": {
        "defaults": {
          "unit": "bytes"
        }
      }
    },
    {
      "id": 7,
      "title": "Total Data Sent (24h)",
      "type": "stat",
      "gridPos": {"h": 4, "w": 12, "x": 12, "y": 24},
      "targets": [
        {
          "expr": "sum(increase(node_network_transmit_bytes_total{device!~\"lo|veth.*|cali.*|docker.*\"}[24h]))",
          "legendFormat": "Uploaded",
          "refId": "A"
        }
      ],
      "options": {
        "reduceOptions": {
          "values": false,
          "calcs": ["lastNotNull"]
        },
        "textMode": "value_and_name",
        "colorMode": "value"
      },
      "fieldConfig": {
        "defaults": {
          "unit": "bytes"
        }
      }
    }
  ]
}

