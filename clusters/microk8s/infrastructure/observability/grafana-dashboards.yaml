apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-dashboards
  namespace: observability
  labels:
    grafana_dashboard: "1"
data:
  cluster-overview.json: |-
    {"title":"Kubernetes Cluster Overview","tags":["kubernetes","cluster"],"timezone":"browser","schemaVersion":38,"version":1,"refresh":"30s","time":{"from":"now-1h","to":"now"},"panels":[{"id":1,"title":"Cluster CPU %","type":"gauge","gridPos":{"h":6,"w":8,"x":0,"y":0},"targets":[{"expr":"(1 - avg(rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))) * 100","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent","min":0,"max":100,"thresholds":{"mode":"absolute","steps":[{"value":0,"color":"green"},{"value":70,"color":"yellow"},{"value":90,"color":"red"}]}}}},{"id":2,"title":"Cluster Memory %","type":"gauge","gridPos":{"h":6,"w":8,"x":8,"y":0},"targets":[{"expr":"(1 - (sum(node_memory_MemAvailable_bytes) / sum(node_memory_MemTotal_bytes))) * 100","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent","min":0,"max":100,"thresholds":{"mode":"absolute","steps":[{"value":0,"color":"green"},{"value":80,"color":"yellow"},{"value":95,"color":"red"}]}}}},{"id":3,"title":"CPU by Node","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":6},"targets":[{"expr":"(1 - avg by (instance) (rate(node_cpu_seconds_total{mode=\"idle\"}[5m]))) * 100","legendFormat":"{{instance}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent","min":0,"max":100}}},{"id":4,"title":"Memory by Node","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":6},"targets":[{"expr":"(1 - (node_memory_MemAvailable_bytes / node_memory_MemTotal_bytes)) * 100","legendFormat":"{{instance}}","refId":"A"}],"fieldConfig":{"defaults":{"unit":"percent","min":0,"max":100}}}]}
  
  network-traffic.json: |-
    {"title":"Network Traffic","tags":["network","bandwidth"],"timezone":"browser","schemaVersion":38,"version":1,"refresh":"30s","time":{"from":"now-1h","to":"now"},"panels":[{"id":1,"title":"Total Network Traffic","type":"timeseries","gridPos":{"h":8,"w":24,"x":0,"y":0},"targets":[{"expr":"sum(rate(node_network_receive_bytes_total{device!~\"lo|veth.*|cali.*|docker.*\"}[5m])) * 8 / 1000000","legendFormat":"Download (Mbps)","refId":"A"},{"expr":"sum(rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|cali.*|docker.*\"}[5m])) * 8 / 1000000","legendFormat":"Upload (Mbps)","refId":"B"}],"fieldConfig":{"defaults":{"unit":"Mbits"}}},{"id":2,"title":"Traffic by Node","type":"timeseries","gridPos":{"h":8,"w":12,"x":0,"y":8},"targets":[{"expr":"sum by (instance) (rate(node_network_receive_bytes_total{device!~\"lo|veth.*|cali.*|docker.*\"}[5m])) * 8 / 1000000","legendFormat":"{{instance}} RX","refId":"A"},{"expr":"sum by (instance) (rate(node_network_transmit_bytes_total{device!~\"lo|veth.*|cali.*|docker.*\"}[5m])) * 8 / 1000000","legendFormat":"{{instance}} TX","refId":"B"}],"fieldConfig":{"defaults":{"unit":"Mbits"}}},{"id":3,"title":"Packet Drops","type":"timeseries","gridPos":{"h":8,"w":12,"x":12,"y":8},"targets":[{"expr":"rate(node_network_receive_drop_total{device!~\"lo|veth.*|cali.*|docker.*\"}[5m])","legendFormat":"{{instance}}/{{device}} RX","refId":"A"},{"expr":"rate(node_network_transmit_drop_total{device!~\"lo|veth.*|cali.*|docker.*\"}[5m])","legendFormat":"{{instance}}/{{device}} TX","refId":"B"}],"fieldConfig":{"defaults":{"unit":"pps"}}}]}
