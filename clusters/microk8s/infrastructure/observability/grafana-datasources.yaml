apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: observability
data:
  datasources.yaml: |
    apiVersion: 1
    
    datasources:
      # Prometheus - Metrics from cluster and SNMP
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus-server.observability.svc.cluster.local
        isDefault: true
        editable: true
        jsonData:
          timeInterval: 30s
          queryTimeout: 60s
      
      # Loki - Log aggregation
      - name: Loki
        type: loki
        access: proxy
        url: http://loki.observability.svc.cluster.local:3100
        isDefault: false
        editable: true
        jsonData:
          maxLines: 1000
          
      # InfluxDB - Home Assistant metrics (long-term)
      - name: InfluxDB
        type: influxdb
        access: proxy
        url: http://influxdb-influxdb2.data-storage.svc.cluster.local:8086
        database: home-assistant
        isDefault: false
        editable: true
        jsonData:
          version: Flux
          organization: home-automation
          defaultBucket: home-assistant
          tlsSkipVerify: true
        secureJsonData:
          token: "influxdb-admin-token-2025-secure"
