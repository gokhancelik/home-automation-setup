apiVersion: v1
kind: ConfigMap
metadata:
  name: frigate-config
  namespace: frigate
data:
  config.yml: |
    # Frigate NVR Configuration
    # https://docs.frigate.video/configuration/

    mqtt:
      host: mosquitto.zigbee.svc.cluster.local
      port: 1883
      user: "{FRIGATE_MQTT_USER}"
      password: "{FRIGATE_MQTT_PASSWORD}"
      topic_prefix: frigate

    # OpenVINO detection with Intel GPU acceleration
    detectors:
      ov:
        type: openvino
        device: GPU

    # Database for event metadata
    database:
      path: /config/frigate.db

    # Model configuration - Using default SSDLite MobileNet v2
    # This is pre-installed and optimized for OpenVINO
    model:
      width: 300
      height: 300
      input_tensor: nhwc
      input_pixel_format: bgr
      path: /openvino-model/ssdlite_mobilenet_v2.xml
      labelmap_path: /openvino-model/coco_91cl_bkgr.txt

    # Recording and snapshot storage
    record:
      enabled: true
      retain:
        days: 7
        mode: active_objects  # Only record when objects detected (was: motion)
      events:
        retain:
          default: 30
          mode: active_objects

    snapshots:
      enabled: true
      retain:
        default: 30

    # Object detection settings (optimized for doorbell camera)
    objects:
      track:
        - person
        - package
        - dog
        - cat
        - car  # Re-added - stationary tracking prevents continuous recording
      filters:
        person:
          min_score: 0.5
          threshold: 0.7
        package:
          min_score: 0.5
          threshold: 0.7

    # FFmpeg hardware acceleration settings
    ffmpeg:
      hwaccel_args: preset-vaapi

    # Camera configuration
    cameras:
      doorbell:
        enabled: true
        ffmpeg:
          inputs:
            - path: rtsp://{DOORBELL_USER}:{DOORBELL_PASSWORD}@192.168.2.12:8554/ch3
              roles:
                - detect
            - path: rtsp://{DOORBELL_USER}:{DOORBELL_PASSWORD}@192.168.2.12:8554/ch3  # Use lower quality for recording too
              roles:
                - record
        detect:
          width: 640
          height: 480
          fps: 3  # Reduced from 5 to save bandwidth
        objects:
          track:
            - person
            - package
            - dog
            - cat
            - car  # Re-added - Frigate's stationary tracking handles parked cars
        zones:
          front_porch:
            coordinates: 0,480,640,480,640,200,0,200
        review:
          alerts:
            labels:
              - person
              - package
          detections:
            labels:
              - dog
              - cat
              - car

      backyard:
        enabled: true  # Re-enabled - camera is active
        ffmpeg:
          inputs:
            - path: rtsp://{BACKYARD_USER}:{BACKYARD_PASSWORD}@192.168.2.48:8554/ch4
              roles:
                - detect
            - path: rtsp://{BACKYARD_USER}:{BACKYARD_PASSWORD}@192.168.2.48:8554/ch3  # Lower quality stream for recording
              roles:
                - record
        detect:
          width: 640
          height: 360
          fps: 3  # Reduced from 5 to save bandwidth
        objects:
          track:
            - person
            - dog
            - cat
        review:
          alerts:
            labels:
              - person
          detections:
            labels:
              - dog
              - cat
