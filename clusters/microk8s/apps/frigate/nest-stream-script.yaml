apiVersion: v1
kind: ConfigMap
metadata:
  name: nest-stream-script
  namespace: frigate
data:
  nest_stream.py: |
    #!/usr/bin/env python3
    import os
    import sys

    # Get arguments
    entity_id = sys.argv[1]
    ha_token = sys.argv[2]

    # HA's camera_proxy_stream bridges WebRTC-only Nest cameras to a plain
    # HTTP stream server-side, since go2rtc itself is locked to 127.0.0.1
    # inside the HA container and can't be reached from this pod.
    url = f"http://192.168.2.59:8123/api/camera_proxy_stream/{entity_id}"

    os.execvp('ffmpeg', [
        'ffmpeg', '-hide_banner', '-loglevel', 'error',
        '-headers', f'Authorization: Bearer {ha_token}\r\n',
        '-i', url,
        '-c:v', 'libx264', '-preset', 'ultrafast', '-tune', 'zerolatency',
        '-f', 'mpegts', 'pipe:1'
    ])
