apiVersion: apps/v1
kind: Deployment
metadata:
  name: frigate
  namespace: frigate
  labels:
    app: frigate
    app.kubernetes.io/name: frigate
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: frigate
  template:
    metadata:
      labels:
        app: frigate
    spec:
      nodeSelector:
        kubernetes.io/hostname: ubuntu-desktop
      initContainers:
        - name: setup-config
          image: busybox:1.36
          command:
            - /bin/sh
            - -c
            - |
              # Copy config template to writable config volume
              cp /config-template/config.yml /config/config.yml

              # Inject MQTT credentials
              sed -i "s/{FRIGATE_MQTT_USER}/$MQTT_USER/" /config/config.yml
              sed -i "s/{FRIGATE_MQTT_PASSWORD}/$MQTT_PASSWORD/" /config/config.yml

              # Inject doorbell camera credentials
              sed -i "s/{DOORBELL_USER}/$DOORBELL_USER/g" /config/config.yml
              sed -i "s/{DOORBELL_PASSWORD}/$DOORBELL_PASSWORD/g" /config/config.yml

              # Inject backyard camera credentials
              sed -i "s/{BACKYARD_USER}/$BACKYARD_USER/g" /config/config.yml
              sed -i "s/{BACKYARD_PASSWORD}/$BACKYARD_PASSWORD/g" /config/config.yml

              # Inject Nest credentials for go2rtc (use | delimiter to avoid issues with special chars)
              sed -i "s|{NEST_PROJECT_ID}|$NEST_PROJECT_ID|g" /config/config.yml
              sed -i "s|{NEST_CLIENT_ID}|$NEST_CLIENT_ID|g" /config/config.yml
              sed -i "s|{NEST_CLIENT_SECRET}|$NEST_CLIENT_SECRET|g" /config/config.yml
              sed -i "s|{NEST_REFRESH_TOKEN}|$NEST_REFRESH_TOKEN|g" /config/config.yml
              sed -i "s|{NEST_DEVICE_ID}|$NEST_DEVICE_ID|g" /config/config.yml
          env:
            - name: MQTT_USER
              valueFrom:
                secretKeyRef:
                  name: frigate-credentials
                  key: mqtt-user
            - name: MQTT_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frigate-credentials
                  key: mqtt-password
            - name: DOORBELL_USER
              valueFrom:
                secretKeyRef:
                  name: frigate-credentials
                  key: doorbell-user
            - name: DOORBELL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frigate-credentials
                  key: doorbell-password
            - name: BACKYARD_USER
              valueFrom:
                secretKeyRef:
                  name: frigate-credentials
                  key: backyard-user
            - name: BACKYARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: frigate-credentials
                  key: backyard-password
            - name: NEST_PROJECT_ID
              valueFrom:
                secretKeyRef:
                  name: frigate-credentials
                  key: nest-project-id
            - name: NEST_CLIENT_ID
              valueFrom:
                secretKeyRef:
                  name: frigate-credentials
                  key: nest-client-id
            - name: NEST_CLIENT_SECRET
              valueFrom:
                secretKeyRef:
                  name: frigate-credentials
                  key: nest-client-secret
            - name: NEST_REFRESH_TOKEN
              valueFrom:
                secretKeyRef:
                  name: frigate-credentials
                  key: nest-refresh-token
            - name: NEST_DEVICE_ID
              valueFrom:
                secretKeyRef:
                  name: frigate-credentials
                  key: nest-device-id
          volumeMounts:
            - name: config
              mountPath: /config
            - name: config-template
              mountPath: /config-template
      containers:
        - name: frigate
          image: ghcr.io/blakeblackshear/frigate:0.17.1
          ports:
            - containerPort: 5000
              name: http
              protocol: TCP
            - containerPort: 8554
              name: rtsp
              protocol: TCP
            - containerPort: 8555
              name: webrtc-tcp
              protocol: TCP
          env:
            - name: TZ
              value: "Europe/Amsterdam"
            - name: GO2RTC_ALLOW_ARBITRARY_EXEC
              value: "true"
            - name: PLUS_API_KEY
              valueFrom:
                secretKeyRef:
                  name: frigate-credentials
                  key: plus-api-key
          volumeMounts:
            - name: config
              mountPath: /config
            - name: media
              mountPath: /media/frigate
            - name: shm
              mountPath: /dev/shm
            - name: dri
              mountPath: /dev/dri
            - name: nest-script
              mountPath: /usr/local/bin/nest_stream.py
              subPath: nest_stream.py
          securityContext:
            privileged: true
          resources:
            requests:
              cpu: 1000m
              memory: 2Gi
            limits:
              cpu: 4000m
              memory: 8Gi
          livenessProbe:
            httpGet:
              path: /api/version
              port: 5000
            initialDelaySeconds: 60
            periodSeconds: 30
            timeoutSeconds: 10
            failureThreshold: 3
          readinessProbe:
            httpGet:
              path: /api/version
              port: 5000
            initialDelaySeconds: 30
            periodSeconds: 10
            timeoutSeconds: 5
            failureThreshold: 2
      volumes:
        - name: config
          persistentVolumeClaim:
            claimName: frigate-config
        - name: config-template
          configMap:
            name: frigate-config
        - name: media
          persistentVolumeClaim:
            claimName: frigate-media
        - name: shm
          emptyDir:
            medium: Memory
            sizeLimit: 1Gi
        - name: dri
          hostPath:
            path: /dev/dri
            type: Directory
        - name: nest-script
          configMap:
            name: nest-stream-script
            defaultMode: 0755
---
apiVersion: v1
kind: Service
metadata:
  name: frigate
  namespace: frigate
  labels:
    app: frigate
spec:
  type: NodePort
  ports:
    - port: 5000
      targetPort: http
      protocol: TCP
      name: http
      nodePort: 30500
    - port: 8554
      targetPort: rtsp
      protocol: TCP
      name: rtsp
      nodePort: 30554
    - port: 8555
      targetPort: webrtc-tcp
      protocol: TCP
      name: webrtc-tcp
      nodePort: 30555
  selector:
    app: frigate
