apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
resources:
  - namespace.yaml
  - pvc.yaml
  # Mosquitto stays in K8s as the single shared broker (Home Assistant,
  # Frigate, factory-lens, and the Docker Zigbee2MQTT all use it).
  - mosquitto-config.yaml
  - mosquitto-deployment.yaml
  # Zigbee2MQTT migrated to Docker on pi-lab (192.168.2.59). The K8s
  # Deployment was removed because its privileged pod kept grabbing
  # /dev/ttyUSB0 from the Docker container, causing sensor dropouts.
  # - zigbee2mqtt-config.yaml
  # - zigbee2mqtt-deployment.yaml
  - external-service.yaml
  - ingress.yaml
  - sealed-secrets.yaml
